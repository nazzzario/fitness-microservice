server:
  port: 8081
spring:
  application:
    name: activity-service
  mongodb:
    uri: mongodb://localhost:27017/fitnessactivity
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: list
    filter: true
    show-logo: true
    url: /v3/api-docs
    urls-primary-name: "Activity Service API"

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8082/eureka/